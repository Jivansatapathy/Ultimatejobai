<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="url(#shine)"/>

  <!-- Briefcase body -->
  <rect x="12" y="26" width="40" height="26" rx="4" fill="none" stroke="white" stroke-width="3"/>

  <!-- Briefcase handle -->
  <path d="M22 26 L22 21 Q22 17 26 17 L38 17 Q42 17 42 21 L42 26" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- Center divider line -->
  <line x1="12" y1="38" x2="52" y2="38" stroke="white" stroke-width="2.5" opacity="0.5"/>

  <!-- AI spark / star -->
  <circle cx="32" cy="38" r="4" fill="white"/>
  <line x1="32" y1="32" x2="32" y2="35" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="41" x2="32" y2="44" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="38" x2="29" y2="38" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="35" y1="38" x2="38" y2="38" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Sparkle top-right -->
  <circle cx="49" cy="14" r="2" fill="#facc15"/>
  <line x1="49" y1="9" x2="49" y2="11" stroke="#facc15" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="49" y1="17" x2="49" y2="19" stroke="#facc15" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="44" y1="14" x2="46" y2="14" stroke="#facc15" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="14" x2="54" y2="14" stroke="#facc15" stroke-width="1.5" stroke-linecap="round"/>
</svg>
